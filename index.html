<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="Mfc Website">
    <meta property="og:site_name" content="Mfc Website">
    <meta property="og:type" content="profile">
    <meta property="og:profile:first_name" content="Faizal">
    <meta property="og:profile:last_name " content="Chan.">
    <meta property="og:profile:username " content="moefc32">
    <meta property="og:profile:gender" content="male">
    <meta property="og:description"
        content="Faizal Chan. - Strong design management professional with a master of management degree, focused in UX from Telkom University.">
    <meta property="og:image" content="https://mf-chan.com/og.jpg">

    <link rel="icon" type="image/x-icon" href="res/favicon.svg">
    <title>Mfc Website</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato&display=swap">
    <link rel="stylesheet" href="res/style.css">

    <script src="res/alpine.min.js" defer></script>
    <script src="res/script.js"></script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-131278165-1"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'UA-131278165-1');
    </script>
</head>

<body x-data="bodyData" x-init="initialize">
    <div class="base">
        <ul class="tab">
            <li><a><i class="fas fa-user fa-fw"></i>Profile</a></li>
            <template x-for="item in subdomains">
                <li>
                    <a :href="item.link" target="_blank">
                        <i :class="item.icon"></i>
                        <span x-text="item.name"></span>
                    </a>
                </li>
            </template>
        </ul>
        <div class="display-card">
            <div class="photo">
                <img src="res/profile.jpg" alt="Profile picture" title="Hai!">
            </div>
            <div class="intro">
                <h1>Faizal Chan.</h1>
                <p class="nick">@moefc32</p>
                <p class="description">Strong design management professional with a master of management degree, focused
                    in UX from Telkom University. Need help for your design problems? Feel free to <a
                        href="mailto:hai@mf-chan.com" target="_blank">contact me</a>!</p>
            </div>
            <div class="mobile-tab">
                <template x-for="item in subdomains">
                    <a :href="item.link" target="_blank">
                        <span x-text="item.name"></span>
                    </a>
                </template>
            </div>
            <div class="hyperlink">
                <template x-for="item in hyperlinks">
                    <a :href="item.link" target="_blank"><i :class="item.icon"></i></a>
                </template>
            </div>
            <div class="credits">
                <a class="text-decoration-none text-muted" target="_blank">Mfc</a> &copy;
                <span x-text="date"></span>
            </div>
        </div>
        <div class="github-repos" :class="githubToggle ? 'open' : ''">
            <template x-for="repo in githubRepos">
                <div class="repository">
                    <a :href="repo.html_url" target="_blank">
                        <span x-text="repo.name"></span>
                        <span x-text="repo.description ?? 'No description yet'"></span>
                    </a>
                </div>
            </template>
        </div>
        <button class="github-toggle" @click="githubToggle = !githubToggle;"
            x-text="githubToggle ? 'Close This List' : 'View My Project Repositories'"></button>
    </div>
</body>

</html>
